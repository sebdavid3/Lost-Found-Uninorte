version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lost_found_db
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-lost_found_uninorte}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lost_found_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lost_found_mq
    ports:
      - '${RABBITMQ_PORT:-5672}:5672'   # Puerto de mensajes
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672' # Panel de administración (user: guest, pass: guest)
    networks:
      - lost_found_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  consul:
    image: hashicorp/consul:1.17
    container_name: lost_found_consul
    ports:
      - '${CONSUL_PORT:-8500}:8500' # UI + HTTP API
    command: agent -dev -client=0.0.0.0
    networks:
      - lost_found_network
    restart: unless-stopped

  claims-service:
    build:
      context: ./services/claims-service
      dockerfile: Dockerfile
    container_name: lost_found_claims_service
    ports:
      - '${CLAIMS_PUBLIC_PORT:-3000}:3000'
    environment:
      DATABASE_URL: ${CLAIMS_DATABASE_URL:-postgresql://admin:password123@db:5432/lost_found_uninorte?schema=public}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      NODE_ENV: ${NODE_ENV:-development}
      CONSUL_HOST: ${CONSUL_HOST:-consul}
      CONSUL_PORT: ${CONSUL_PORT:-8500}
      SERVICE_HOST: ${CLAIMS_SERVICE_HOST:-claims-service}
      SERVICE_PORT: ${CLAIMS_SERVICE_PORT:-3000}
      PORT: ${CLAIMS_SERVICE_PORT:-3000}
    volumes:
      - ./services/claims-service/src:/usr/src/app/src
      - ./services/claims-service/prisma:/usr/src/app/prisma
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      consul:
        condition: service_started
    networks:
      - lost_found_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider \"http://localhost:$${SERVICE_PORT:-3000}/\""]
      interval: 10s
      timeout: 5s
      retries: 3
    command: sh -c "npx prisma migrate deploy && npm run seed:objects && npm run start:prod"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lost_found_frontend
    ports:
      - '${FRONTEND_PUBLIC_PORT:-5173}:80'
    depends_on:
      claims-service:
        condition: service_healthy
    networks:
      - lost_found_network
    restart: unless-stopped

  audit-db:
    image: postgres:15-alpine
    container_name: lost_found_audit_db
    environment:
      POSTGRES_USER: ${AUDIT_DB_USER:-admin}
      POSTGRES_PASSWORD: ${AUDIT_DB_PASSWORD:-password123}
      POSTGRES_DB: ${AUDIT_DB_NAME:-audit_log_db}
    ports:
      - '${AUDIT_DB_PORT:-5433}:5432'
    volumes:
      - audit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lost_found_network
    restart: unless-stopped

  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    container_name: lost_found_audit_service
    ports:
      - '${AUDIT_PUBLIC_PORT:-3001}:3001'
    environment:
      DATABASE_URL: ${AUDIT_DATABASE_URL:-postgresql://admin:password123@audit-db:5432/audit_log_db?schema=public}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_PORT: ${AUDIT_SERVICE_PORT:-3001}
      PORT: ${AUDIT_SERVICE_PORT:-3001}
    volumes:
      - ./services/audit-service/src:/usr/src/app/src
      - ./services/audit-service/prisma:/usr/src/app/prisma
    depends_on:
      audit-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - lost_found_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider \"http://localhost:$${SERVICE_PORT:-3001}/audit-log\""]
      interval: 10s
      timeout: 5s
      retries: 3
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

networks:
  lost_found_network:
    driver: bridge

volumes:
  postgres_data:
  audit_postgres_data:
